<!doctype html>
<html lang="en" data-theme="minimal">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#FAFAF8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="A calm daily journal — intentions, reflections, and a little spark. Stays on your device." />

    <!-- PWA installability (W3C standard + Apple legacy) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Unfolding" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Prevent phone-number auto-linking -->
    <meta name="format-detection" content="telephone=no" />

    <title>Unfolding</title>

    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('unfolding-theme')
        if (t === 'playful' || t === 'minimal') {
          document.documentElement.setAttribute('data-theme', t)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
